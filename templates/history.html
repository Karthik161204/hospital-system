<!DOCTYPE html>
<html>
<head>

<title>Patient History</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#f4f7fb;
font-family:Arial;
}

.header{
background:#0077b6;
color:white;
padding:20px;
text-align:center;
}

.card{
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="header">

<h2><i class="fa-solid fa-notes-medical"></i> Patient History</h2>

</div>

<div class="container mt-5">

<div class="card p-4">

<table class="table table-hover">

<thead class="table-primary">

<tr>

<th>Patient Name</th>
<th>Doctor</th>
<th>Date</th>
<th>Token</th>
<th>Prescription</th>
<th>Update</th>

</tr>

</thead>

<tbody>

{% for a in appointments %}

<tr>

<td>{{a.patient_name}}</td>
<td>{{a.doctor_id}}</td>
<td>{{a.date}}</td>
<td>{{a.token}}</td>
<td>{{a.prescription}}</td>

<td>
<a href="/update/{{a.id}}" class="btn btn-sm btn-primary">
Update
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
