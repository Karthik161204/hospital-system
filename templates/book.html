<!DOCTYPE html>
<html>
<head>

<title>Book Appointment</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(120deg,#0077b6,#90e0ef);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="form-box">

<h3 class="text-center mb-4">Book Appointment</h3>

<form method="POST">

<label>Patient Name</label>
<input type="text" name="name" class="form-control mb-3" required>

<label>Select Date</label>
<input type="date" name="date" class="form-control mb-3" required>

<label>Previous Prescription / Symptoms</label>
<textarea name="prescription" class="form-control mb-3" placeholder="Enter previous prescription or symptoms"></textarea>

<button class="btn btn-primary w-100">Confirm Appointment</button>

</form>

</div>

</body>
</html>
