<!DOCTYPE html>
<html>
<head>

<title>Update Prescription</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(120deg,#00b4d8,#90dbf4);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="box">

<h3 class="text-center mb-4">Update Prescription</h3>

<form method="POST">

<textarea name="prescription" class="form-control mb-3" placeholder="Enter new prescription"></textarea>

<button class="btn btn-success w-100">Update</button>

</form>

</div>

</body>
</html>
